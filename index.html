<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Ocean County, NJ — Property Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root {
  --bg: #0A0A0A;
  --panel: #0F172A;
  --panel-2: #111A2E;
  --border: #1F2937;
  --text: #E5E7EB;
  --text-muted: #94A3B8;
  --accent: #3B82F6;
  --accent-hover: #60A5FA;
  --good: #10b981;
  --shadow-glow: 0 0 16px rgba(59, 130, 246, 0.30);

  --c-foreclosure:    #EF4444;
  --c-tax:            #F59E0B;
  --c-lien:           #EAB308;
  --c-estate:         #8B5CF6;
  --c-code:           #F97316;
  --c-transfer:       #06B6D4;
  --c-bankruptcy:     #DC2626;
  --c-divorce:        #EC4899;
  --c-eviction:       #84CC16;
  --c-tired_landlord: #14B8A6;
  --c-surplus_owed:   #10B981;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; line-height: 1.5; }
body { padding: 16px 20px 24px; max-width: 1700px; margin: 0 auto; }
a { color: var(--accent); text-decoration: none; }
a:hover { color: var(--accent-hover); }
button { font-family: inherit; }

/* CRITICAL ERROR BANNER */
#error-banner { display: none; background: #7f1d1d; color: #fef2f2; border: 1px solid #ef4444; padding: 12px 16px; border-radius: 6px; margin-bottom: 12px; font-family: Consolas, monospace; font-size: 12px; white-space: pre-wrap; }
#error-banner.visible { display: block; }

/* HEADER */
header.top { display: flex; justify-content: space-between; align-items: flex-end; gap: 24px; margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
header.top h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
header.top h1 .sub { color: var(--text-muted); font-size: 14px; font-weight: 400; margin-left: 12px; }
header.top .meta { font-size: 12px; color: var(--text-muted); text-align: right; line-height: 1.6; }
header.top .meta a { margin-left: 14px; }

/* STAT ROWS */
.stat-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; padding: 8px 0; font-size: 12px; }
.stat-row .stat-tile { background: var(--panel); border: 1px solid var(--border); border-radius: 4px; padding: 5px 10px; cursor: pointer; transition: all .12s; user-select: none; }
.stat-row .stat-tile:hover { border-color: var(--accent); }
.stat-row .stat-tile.active { background: rgba(59, 130, 246, 0.15); border-color: var(--accent); box-shadow: var(--shadow-glow); }
.stat-row .stat-tile.total { background: var(--panel-2); cursor: default; font-weight: 600; }
.stat-row .stat-tile.total .label { color: var(--text); }
.stat-row .stat-tile.dimmed { opacity: 0.45; cursor: help; }
.stat-row .stat-tile.dimmed:hover { opacity: 0.75; border-color: var(--border); box-shadow: none; }
.stat-row .stat-tile .label { color: var(--text-muted); margin-right: 6px; }
.stat-row .stat-tile .value { font-weight: 700; }
.stat-row.qa { color: var(--text-muted); padding-bottom: 12px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
.stat-row.qa .stat-tile { cursor: default; padding: 4px 8px; }

/* PRE-CANNED VIEWS */
.precanned { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px 0 12px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
.precanned button { background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 999px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all .12s; }
.precanned button:hover { border-color: var(--accent); box-shadow: var(--shadow-glow); }
.precanned button .pc-count { color: var(--text-muted); margin-left: 4px; font-size: 11px; }

/* MAIN LAYOUT */
.layout { display: grid; grid-template-columns: 280px 1fr; gap: 16px; }

/* FILTER RAIL */
aside.filters { position: sticky; top: 12px; align-self: start; max-height: calc(100vh - 24px); overflow-y: auto; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 16px; font-size: 13px; }
aside.filters h3 { font-size: 11px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; margin-top: 14px; }
aside.filters h3:first-child { margin-top: 0; }

aside.filters .pat-group { margin-bottom: 4px; border-radius: 4px; }
aside.filters .pat-group.dimmed { opacity: 0.5; }
aside.filters .pat-row { display: flex; align-items: center; gap: 6px; padding: 4px 0; cursor: pointer; user-select: none; }
aside.filters .pat-row input[type="checkbox"] { accent-color: var(--accent); cursor: pointer; }
aside.filters .pat-row .swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }
aside.filters .pat-row .pat-name { flex: 1; }
aside.filters .pat-row .pat-count { color: var(--text-muted); font-size: 11px; font-variant-numeric: tabular-nums; }
aside.filters .subtypes { padding-left: 22px; padding-bottom: 4px; }
aside.filters .subtype-row { display: flex; align-items: center; gap: 6px; padding: 2px 0; font-size: 12px; cursor: pointer; user-select: none; }
aside.filters .subtype-row input { accent-color: var(--accent); cursor: pointer; }
aside.filters .subtype-row .sub-count { color: var(--text-muted); font-size: 11px; }

aside.filters .toggle { display: flex; align-items: center; gap: 6px; padding: 4px 0; cursor: pointer; user-select: none; }
aside.filters .toggle input { accent-color: var(--accent); cursor: pointer; }
aside.filters .toggle .attr-count { color: var(--text-muted); margin-left: auto; font-size: 11px; }
aside.filters .toggle.dimmed { opacity: 0.5; }

aside.filters .slider-block { padding: 6px 0; }
aside.filters .slider-block label { color: var(--text-muted); display: block; font-size: 11px; margin-bottom: 4px; }
aside.filters .slider-block .slider-row { display: flex; align-items: center; gap: 6px; }
aside.filters input[type="range"] { flex: 1; accent-color: var(--accent); }
aside.filters .slider-val { font-variant-numeric: tabular-nums; min-width: 40px; text-align: right; font-weight: 500; }

aside.filters .match-mode { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
aside.filters .match-mode button { background: var(--panel-2); border: 1px solid var(--border); color: var(--text); padding: 6px 0; border-radius: 4px; font-size: 11px; font-weight: 600; cursor: pointer; transition: all .12s; }
aside.filters .match-mode button:hover { border-color: var(--accent); }
aside.filters .match-mode button.active { background: var(--accent); border-color: var(--accent); color: #fff; }

aside.filters .clear-btn { width: 100%; background: transparent; color: var(--text-muted); border: 1px solid var(--border); padding: 6px; border-radius: 4px; font-size: 12px; cursor: pointer; margin-top: 12px; }
aside.filters .clear-btn:hover { color: var(--text); border-color: var(--accent); }

/* MAIN CONTENT */
main.content { min-width: 0; }
.content-toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
.content-toolbar input[type="text"] { background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 7px 12px; border-radius: 4px; flex: 1; font-family: inherit; font-size: 13px; }
.content-toolbar input[type="text"]:focus { outline: none; border-color: var(--accent); box-shadow: var(--shadow-glow); }
.content-toolbar select { background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 7px 10px; border-radius: 4px; font-family: inherit; font-size: 12px; }
.content-toolbar button.cta { background: var(--accent); border: none; color: #fff; padding: 7px 14px; border-radius: 4px; font-weight: 500; cursor: pointer; font-size: 12px; }
.content-toolbar button.cta:hover { background: var(--accent-hover); }
.content-toolbar .results-count { color: var(--text-muted); font-size: 12px; min-width: 140px; }

/* LEAD CARDS (table-driven for dense scanning) */
.cards-wrap { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.lead-row { display: grid; grid-template-columns: 1.4fr 1.1fr 1.6fr; gap: 12px; padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background .08s; align-items: start; }
.lead-row:hover { background: rgba(59, 130, 246, 0.05); }
.lead-row.expanded { background: rgba(59, 130, 246, 0.10); }
.lead-row.expand { background: var(--panel-2); cursor: default; padding: 18px 22px; grid-template-columns: 1fr; }
.col { min-width: 0; }
.col .pid { font-weight: 700; font-size: 13px; }
.col .pid-sub { color: var(--text-muted); font-size: 11px; }
.col .situs { font-size: 13px; margin-top: 4px; }
.col .owner { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
.col .mailing { color: var(--text-muted); font-size: 11px; margin-top: 2px; font-style: italic; }
.col .mun { color: var(--text-muted); font-size: 11px; }
.col .yo { color: var(--text-muted); font-size: 11px; margin-top: 4px; }
.col .chips { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 4px; }
.col .icons { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }
.col .signal-when { font-size: 12px; }
.col .amount { font-weight: 600; font-size: 13px; margin-top: 4px; }
.col .defendant { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
.col .vals { color: var(--text-muted); font-size: 11px; margin-top: 4px; }

.chip { display: inline-block; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; line-height: 1.4; cursor: default; }
.chip.foreclosure { background: var(--c-foreclosure); }
.chip.tax { background: var(--c-tax); }
.chip.lien { background: var(--c-lien); color: #1F2937; }
.chip.estate { background: var(--c-estate); }
.chip.code { background: var(--c-code); }
.chip.transfer { background: var(--c-transfer); color: #1F2937; }
.chip.bankruptcy { background: var(--c-bankruptcy); }
.chip.divorce { background: var(--c-divorce); }
.chip.eviction { background: var(--c-eviction); color: #1F2937; }
.chip.tired_landlord { background: var(--c-tired_landlord); }
.chip.surplus_owed { background: var(--c-surplus_owed); }
.chip.discharged { opacity: 0.4; text-decoration: line-through; }

.icons svg { stroke: var(--accent); width: 16px; height: 16px; flex-shrink: 0; opacity: 0.95; }
.icons .ic { display: inline-flex; cursor: help; }

.new-badge { display: inline-block; background: var(--good); color: #fff; padding: 1px 6px; border-radius: 3px; font-size: 10px; margin-right: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }

.signal-block { border-left: 3px solid var(--accent); padding: 10px 12px; margin: 8px 0; background: rgba(15, 23, 42, 0.55); border-radius: 0 4px 4px 0; }
.signal-block .signal-head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
.signal-block .signal-head strong { font-size: 13px; }
.signal-block .signal-meta { color: var(--text-muted); font-size: 11px; }
.signal-block .signal-payload { font-family: Consolas, monospace; font-size: 11px; color: var(--text-muted); margin-top: 6px; word-break: break-word; line-height: 1.5; }

.expand-grid { display: grid; grid-template-columns: 200px 1fr; gap: 6px 14px; margin-bottom: 14px; }
.expand-grid .key { color: var(--text-muted); font-size: 12px; }
.expand-grid .val { color: var(--text); font-size: 13px; word-break: break-word; }

footer { margin-top: 24px; padding-top: 12px; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 12px; text-align: center; }
.empty-state { text-align: center; padding: 30px 16px; color: var(--text-muted); background: var(--panel); border: 1px solid var(--border); border-radius: 8px; }

@media (max-width: 1100px) {
  .layout { grid-template-columns: 1fr; }
  aside.filters { position: static; max-height: unset; }
}
@media (max-width: 720px) {
  .lead-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="error-banner"></div>

<header class="top">
  <h1>Ocean County, NJ <span class="sub">Property Intelligence</span></h1>
  <div class="meta">
    <div id="m-refresh">Loading…</div>
    <div id="m-source-attribution"></div>
    <div>
      <a href="methodology.html">Methodology</a>
      <a href="https://github.com/xcerebroai/ocean-intel" target="_blank">Source</a>
    </div>
  </div>
</header>

<div class="stat-row" id="stats-leadtypes"></div>
<div class="stat-row qa" id="stats-quality"></div>

<div class="precanned" id="precanned-row"></div>

<div class="layout">
  <aside class="filters">
    <h3>Lead types</h3>
    <div id="filter-patterns"></div>

    <h3>Parcel attributes</h3>
    <div id="filter-attributes"></div>

    <h3>Years owned</h3>
    <div class="slider-block">
      <div class="slider-row">
        <input type="range" id="f-yo" min="0" max="50" value="0" step="1" />
        <span class="slider-val" id="f-yo-v">0+</span>
      </div>
    </div>
    <h3>Assessed value</h3>
    <div class="slider-block">
      <label>Min: <span id="f-amin-v">$0</span></label>
      <div class="slider-row">
        <input type="range" id="f-amin" min="0" max="2000000" value="0" step="50000" />
      </div>
      <label style="margin-top:4px">Max: <span id="f-amax-v">no cap</span></label>
      <div class="slider-row">
        <input type="range" id="f-amax" min="0" max="2000000" value="0" step="50000" />
      </div>
    </div>

    <h3>Match mode</h3>
    <div class="match-mode" id="match-mode-buttons">
      <button data-mode="ANY" class="active">ANY</button>
      <button data-mode="ALL">ALL</button>
      <button data-mode="2+">2+</button>
      <button data-mode="3+">3+</button>
    </div>

    <button class="clear-btn" id="clear-all">Clear all filters</button>
  </aside>

  <main class="content">
    <div class="content-toolbar">
      <input type="text" id="q" placeholder="Search address, owner, PID, case #, defendant, plaintiff…" />
      <select id="sort">
        <option value="last_signal_date_desc">Sort: Most recent signal</option>
        <option value="pattern_count_desc">Sort: Most signals (stack depth)</option>
        <option value="years_owned_desc">Sort: Years owned (desc)</option>
        <option value="years_owned_asc">Sort: Years owned (asc)</option>
        <option value="assessed_desc">Sort: Assessed value (desc)</option>
        <option value="situs_asc">Sort: Address</option>
      </select>
      <button class="cta" id="export-csv">Export CSV</button>
      <span class="results-count" id="results-count">Loading…</span>
    </div>

    <div class="cards-wrap" id="cards-wrap"></div>
  </main>
</div>

<footer>
  <div id="footer-content"></div>
  <div style="margin-top:6px">⚡ Built by Jarvis (Just Jarvis LLC) for Quentin Flores. Operator-first.</div>
</footer>

<script>
"use strict";

// =============== Error capture ============================================
window.addEventListener("error", (e) => showError(`JS error: ${e.message}\n${e.filename}:${e.lineno}`));
window.addEventListener("unhandledrejection", (e) => showError(`Promise rejection: ${e.reason}`));
function showError(msg) {
  try {
    const el = document.getElementById("error-banner");
    if (!el) return;
    el.classList.add("visible");
    el.textContent = (el.textContent ? el.textContent + "\n" : "") + msg;
  } catch (_) { /* swallow — error handler must not throw */ }
}

// =============== State ====================================================
let RAW = null;
let RECORDS = [];
const filters = {
  patterns: new Set(),
  subtypes: new Set(),
  attributes: new Set(),
  match_mode: "ANY",
  search: "",
  minYearsOwned: 0,
  minAssessed: 0,
  maxAssessed: 0,
};
let sort_key = "last_signal_date_desc";

const PATTERN_NAMES = ["foreclosure","tax","lien","estate","code","transfer","bankruptcy","divorce","eviction","tired_landlord","surplus_owed"];
const ATTR_NAMES = ["vacant","absentee","out_of_state","senior_owner","long_term_owned","free_and_clear","high_equity","entity_owned","multiple_properties"];
const PATTERN_DISPLAY = {
  foreclosure: "Foreclosure", tax: "Tax Distress", lien: "Liens", estate: "Estate / Probate",
  code: "Code / Condemnation", transfer: "Distressed Transfer", bankruptcy: "Bankruptcy",
  divorce: "Divorce", eviction: "Eviction", tired_landlord: "Tired Landlord",
  surplus_owed: "Surplus Owed",
};
const ATTR_DISPLAY = {
  vacant: "Vacant", absentee: "Absentee", out_of_state: "Out-of-state",
  senior_owner: "Senior owner", long_term_owned: "Long-term owned",
  free_and_clear: "Free-and-clear", high_equity: "High equity",
  entity_owned: "Entity-owned", multiple_properties: "Multiple properties",
};

// Operator-realistic pre-canned views (replaces v2 academic set)
const PRECANNED_VIEWS = [
  { id: "sheriff_calls",    label: "Sheriff sales — call list", patterns: ["foreclosure"], attributes: [], mode: "ANY",
    sort: "last_signal_date_desc",
    description: "All sheriff sale leads, sorted by upcoming sale date." },
  { id: "estate_absentee",  label: "Estate-owned + absentee",   patterns: ["estate"], attributes: ["absentee"], mode: "ALL",
    sort: "last_signal_date_desc",
    description: "Properties recently transferred to/from estates whose mailing address differs from the situs." },
  { id: "tax_longterm",     label: "Tax distress + long-term owner", patterns: ["tax"], attributes: ["long_term_owned"], mode: "ALL",
    sort: "years_owned_desc",
    description: "Tax-distress filings on parcels owned 15+ years — high-equity targets." },
  { id: "out_of_state",     label: "Out-of-state landlord",     patterns: [], attributes: ["out_of_state"], mode: "ANY",
    sort: "assessed_desc",
    description: "Any lead with an out-of-state mailing address — tired-landlord precursor." },
  { id: "lien_entity",      label: "Construction lien + entity owner", patterns: ["lien"], attributes: ["entity_owned"], mode: "ALL",
    sort: "last_signal_date_desc",
    description: "Construction/mechanic's liens on entity-owned parcels — stalled-rehab targets." },
  { id: "transfer_estate",  label: "Recently transferred to estate",   patterns: ["transfer", "estate"], attributes: [], mode: "ALL",
    sort: "last_signal_date_desc",
    description: "Properties whose recent deed shows estate-related transfer — heir leads." },
];

// =============== matches() — single source of truth =======================
function matches(lead) {
  if (filters.search) {
    const blob = [
      lead.owner, lead.situs_address, lead.mailing_address, lead.pid,
      lead.mun_name,
      ...((lead.signals || []).map(s => [
        s.case_no, s.foreclosure_no, s.plaintiff, s.defendant,
        s.instrument_number, s.book, s.page,
        Array.isArray(s.grantor) ? s.grantor.join(" ") : (s.grantor || ""),
        Array.isArray(s.grantee) ? s.grantee.join(" ") : (s.grantee || ""),
        JSON.stringify(s.payload || {}),
      ].join(" "))),
    ].join(" ").toLowerCase();
    if (!blob.includes(filters.search.toLowerCase())) return false;
  }
  if (filters.minYearsOwned > 0) {
    if ((lead.years_owned || 0) < filters.minYearsOwned) return false;
  }
  if (filters.minAssessed > 0) {
    if ((lead.assessed_value || 0) < filters.minAssessed) return false;
  }
  if (filters.maxAssessed > 0) {
    if (lead.assessed_value !== null && lead.assessed_value !== undefined && lead.assessed_value > filters.maxAssessed) return false;
  }
  const total_checked = filters.patterns.size + filters.subtypes.size + filters.attributes.size;
  if (total_checked === 0) return true;
  let matched = 0;
  for (const p of filters.patterns) if ((lead.patterns || []).includes(p)) matched++;
  for (const a of filters.attributes) if ((lead.attributes || []).includes(a)) matched++;
  for (const pair of filters.subtypes) {
    const i = pair.indexOf(":");
    const pat = pair.slice(0, i), sub = pair.slice(i + 1);
    if ((lead.signals || []).some(s => s.pattern === pat && s.subtype === sub)) matched++;
  }
  if (filters.match_mode === "ALL") return matched === total_checked;
  if (filters.match_mode === "2+")  return matched >= 2;
  if (filters.match_mode === "3+")  return matched >= 3;
  return matched >= 1;
}

// =============== Helpers ==================================================
function fmtMoney(v) { if (v === null || v === undefined || v === "") return "—"; const n = Number(v); if (isNaN(n)) return v; return "$" + n.toLocaleString(); }
function escapeHtml(s) { if (s === null || s === undefined) return ""; return String(s).replace(/[&<>"']/g, ch => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch])); }
function escapeAttr(s) { return escapeHtml(s).replace(/`/g, "&#96;"); }
function safeObj(v) { return v && typeof v === "object" ? v : {}; }
function safeArr(v) { return Array.isArray(v) ? v : []; }
function fmtRelative(iso) {
  if (!iso) return "—";
  const d = new Date(iso);
  if (isNaN(d.getTime())) return iso;
  const days = Math.round((Date.now() - d.getTime()) / (24*3600*1000));
  if (days < -1) return `in ${-days}d`;
  if (days <= 0) return "today";
  if (days === 1) return "yesterday";
  if (days < 30) return `${days}d ago`;
  if (days < 365) return `${Math.round(days/30)}mo ago`;
  return `${Math.round(days/365)}y ago`;
}

function renderLeadTypeStats(filtered) {
  const counts = {};
  for (const p of PATTERN_NAMES) counts[p] = 0;
  for (const r of filtered) for (const p of safeArr(r.patterns)) counts[p] = (counts[p] || 0) + 1;
  const totalCounts = safeObj(RAW.pattern_counts);
  const row = document.getElementById("stats-leadtypes");
  let html = `<div class="stat-tile total"><span class="label">Total:</span><span class="value">${filtered.length.toLocaleString()}</span></div>`;
  for (const p of PATTERN_NAMES) {
    const totalCount = totalCounts[p] || 0;
    const isDimmed = totalCount === 0 ? " dimmed" : "";
    const isActive = filters.patterns.has(p) ? " active" : "";
    const tooltip = totalCount === 0
      ? `${PATTERN_DISPLAY[p]} (0) — no clerk data ingested yet. See methodology for unblocking paths (OPRA + seeded session).`
      : `${PATTERN_DISPLAY[p]}: ${counts[p]} of ${totalCount} matching current filters`;
    html += `<div class="stat-tile${isActive}${isDimmed}" data-stat-pattern="${p}" title="${escapeAttr(tooltip)}"><span class="label">${PATTERN_DISPLAY[p]}:</span><span class="value">${counts[p].toLocaleString()}</span></div>`;
  }
  row.innerHTML = html;
}

function renderQualityStats(filtered) {
  const total_signals = filtered.reduce((a, r) => a + safeArr(r.signals).length, 0);
  const new24 = filtered.filter(r => r.is_new_in_24h).length;
  const max_stack = filtered.reduce((m, r) => Math.max(m, r.pattern_count || 0), 0);
  const ingest = safeObj(RAW.clerk_ingest_status);
  const heart = safeObj(RAW.clerk_heartbeat);
  const ingestText = ingest.configured
    ? (`OPRA: ${ingest.opra_records_total || 0} · seeded: ${ingest.seeded_records_last_run || 0}` + (ingest.seeded_session_age_hours !== null && ingest.seeded_session_age_hours !== undefined ? ` (${ingest.seeded_session_age_hours}h)` : ""))
    : "Clerk ingest: not configured (see methodology — OPRA / seeded session)";
  const row = document.getElementById("stats-quality");
  row.innerHTML = `
    <div class="stat-tile"><span class="label">Total signals:</span><span class="value">${total_signals.toLocaleString()}</span></div>
    <div class="stat-tile"><span class="label">New (24h):</span><span class="value">${new24}</span></div>
    <div class="stat-tile"><span class="label">Most stacked:</span><span class="value">${max_stack}</span></div>
    <div class="stat-tile"><span class="label">Clerk index:</span><span class="value">${escapeHtml(heart.lastDocumentRecordedInfo || "—")}</span></div>
    <div class="stat-tile" title="${escapeAttr(ingestText)}"><span class="label">Clerk ingest:</span><span class="value">${escapeHtml(ingestText)}</span></div>
  `;
}

function renderPrecanned(filtered) {
  const row = document.getElementById("precanned-row");
  // Compute count for each view by running its filter set against RECORDS
  const html = PRECANNED_VIEWS.map(v => {
    const tmp = {
      patterns: new Set(v.patterns),
      subtypes: new Set(),
      attributes: new Set(v.attributes),
      match_mode: v.mode,
      search: "",
      minYearsOwned: 0, minAssessed: 0, maxAssessed: 0,
    };
    let count = 0;
    const saved = { p: filters.patterns, s: filters.subtypes, a: filters.attributes, m: filters.match_mode, sr: filters.search, my: filters.minYearsOwned, ma: filters.minAssessed, mx: filters.maxAssessed };
    Object.assign(filters, tmp);
    for (const r of RECORDS) if (matches(r)) count++;
    filters.patterns = saved.p; filters.subtypes = saved.s; filters.attributes = saved.a; filters.match_mode = saved.m; filters.search = saved.sr; filters.minYearsOwned = saved.my; filters.minAssessed = saved.ma; filters.maxAssessed = saved.mx;
    return `<button data-precanned="${v.id}" title="${escapeAttr(v.description)}">${escapeHtml(v.label)} <span class="pc-count">(${count})</span></button>`;
  }).join("");
  row.innerHTML = html;
}

function renderFilterRail() {
  const subTotalsByPat = safeObj(RAW.lead_type_subtype_counts);

      <input type="checkbox" data-attribute="${a}" ${checked}/>

}

function renderCards(filtered) {
  const wrap = document.getElementById("cards-wrap");
  const sorted = [...filtered];
  sorted.sort((a, b) => {
    if (sort_key === "last_signal_date_desc") return (b.last_signal_date || "").localeCompare(a.last_signal_date || "");
    if (sort_key === "pattern_count_desc")    return (b.pattern_count || 0) - (a.pattern_count || 0);
    if (sort_key === "years_owned_desc")      return (b.years_owned || -1) - (a.years_owned || -1);
    if (sort_key === "years_owned_asc")       return (a.years_owned == null ? Infinity : a.years_owned) - (b.years_owned == null ? Infinity : b.years_owned);
    if (sort_key === "assessed_desc")         return (b.assessed_value || 0) - (a.assessed_value || 0);
    if (sort_key === "situs_asc")             return (a.situs_address || "").localeCompare(b.situs_address || "");
    return 0;
  });
  const MAX = 800;
  const display = sorted.slice(0, MAX);
  if (!display.length) {
    wrap.innerHTML = `<div class="empty-state">No leads match the current filters.</div>`;
    wrap.dataset.sortedJson = "[]";
    return;
  }
  const rows = display.map((r, i) => {
    const newBadge = r.is_new_in_24h ? `<span class="new-badge">NEW</span>` : "";
    const chips = safeArr(r.patterns).map(p => {
      const subs = safeArr(r.signals).filter(s => s.pattern === p);
      const tooltip = subs.length ? `${PATTERN_DISPLAY[p]} — ${subs.map(s=>s.subtype||s.doc_type||"").filter(Boolean).slice(0,3).join(", ")}` : PATTERN_DISPLAY[p];
      const discharged = subs.length && subs.every(s => s.discharged) ? " discharged" : "";
      return `<span class="chip ${p}${discharged}" title="${escapeAttr(tooltip)}">${PATTERN_DISPLAY[p]}</span>`;
    }).join("");
    const icons = safeArr(r.attributes).map(a =>
      `<span class="ic" title="${escapeAttr(ATTR_DISPLAY[a]||a)}"><svg width="16" height="16"><use xlink:href="#i-${a}"></use></svg></span>`
    ).join("");
    // Pull primary amount + defendant from first signal if present
    const sig0 = safeArr(r.signals)[0] || {};
    const amount = sig0.amount;
    const defendant = sig0.defendant || (Array.isArray(sig0.grantor) ? sig0.grantor.join(", ") : sig0.grantor) || "";
    const lastSigDate = r.last_signal_date || "";

    return `<div class="lead-row" data-idx="${i}">
      <div class="col">
        <div class="pid">${newBadge}${escapeHtml(r.pid || "")}</div>
        <div class="pid-sub">Block ${escapeHtml(r.block || "—")} · Lot ${escapeHtml(r.lot || "—")}${r.qualifier ? " · Qual " + escapeHtml(r.qualifier) : ""}</div>
        <div class="situs">${escapeHtml(r.situs_address || "—")}</div>
        <div class="mun">${escapeHtml(r.mun_name || "")}</div>
        <div class="owner">${escapeHtml(r.owner || "(owner redacted)")}</div>
        ${r.attributes && r.attributes.includes("absentee") && r.mailing_address ? `<div class="mailing">Mail: ${escapeHtml(r.mailing_address)}, ${escapeHtml(r.mailing_city_state||"")}</div>` : ""}
      </div>
      <div class="col">
        <div class="chips">${chips}</div>
        <div class="icons">${icons}</div>
        <div class="yo">${r.years_owned != null ? r.years_owned + " yrs owned" : ""}</div>
      </div>
      <div class="col">
        <div class="signal-when"><strong>${escapeHtml(lastSigDate || "—")}</strong> <span style="color:var(--text-muted);font-size:11px">(${escapeHtml(fmtRelative(lastSigDate))})</span></div>
        ${amount != null ? `<div class="amount">${fmtMoney(amount)}</div>` : ""}
        ${defendant ? `<div class="defendant">${escapeHtml(defendant)}</div>` : ""}
        <div class="vals">Assessed ${fmtMoney(r.assessed_value)} · Last sale ${fmtMoney(r.last_sale_price)}${r.last_sale_date ? " (" + escapeHtml(r.last_sale_date.slice(0,4)) + ")" : ""}</div>
      </div>
    </div>`;
  }).join("");
  const more = sorted.length > MAX
    ? `<div class="empty-state">${(sorted.length - MAX).toLocaleString()} more leads match — refine filters to narrow.</div>`
    : "";
  wrap.innerHTML = rows + more;
  wrap.dataset.sortedJson = JSON.stringify(display);
}

function renderResults(filtered) {
  document.getElementById("results-count").textContent =
    `${filtered.length.toLocaleString()} of ${RECORDS.length.toLocaleString()} leads`;
}

function renderAll() {
  const filtered = RECORDS.filter(matches);
  renderLeadTypeStats(filtered);
  renderQualityStats(filtered);
  renderPrecanned(filtered);
  renderCards(filtered);
  renderResults(filtered);
}

// =============== Expand ===================================================
function expandRow(rowEl) {
  const idx = rowEl.dataset.idx;
  const sorted = JSON.parse(document.getElementById("cards-wrap").dataset.sortedJson || "[]");
  const r = sorted[idx];
  if (!r) return;
  const nxt = rowEl.nextElementSibling;
  if (nxt && nxt.classList.contains("expand")) { nxt.remove(); rowEl.classList.remove("expanded"); return; }
  document.querySelectorAll(".lead-row.expand").forEach(x => x.remove());
  document.querySelectorAll(".lead-row.expanded").forEach(x => x.classList.remove("expanded"));

  const sigsByPat = {};
  for (const s of safeArr(r.signals)) (sigsByPat[s.pattern || "?"] = sigsByPat[s.pattern || "?"] || []).push(s);
  const sigBlocks = Object.keys(sigsByPat).sort().map(p => {
    return sigsByPat[p].map(s => {
      const payload = Object.entries(safeObj(s.payload)).filter(([, v]) => v != null && v !== "");
      const payloadStr = payload.map(([k, v]) => `${k}: ${typeof v === "string" ? v : JSON.stringify(v)}`).join(" · ");
      return `<div class="signal-block" style="border-left-color: var(--c-${p})">
        <div class="signal-head"><span class="chip ${p}${s.discharged?' discharged':''}">${PATTERN_DISPLAY[p] || p}</span><strong>${escapeHtml(s.subtype || s.doc_type || "")}</strong>${s.discharged?'<span style="color:var(--text-muted);font-size:11px;margin-left:6px">discharged '+escapeHtml(s.discharged_date||"")+'</span>':''}</div>
        <div class="signal-meta">${escapeHtml(s.source || "")} · ${escapeHtml(s.date || "no date")}${s.case_no ? " · case " + escapeHtml(s.case_no) : ""}${s.amount != null ? " · " + fmtMoney(s.amount) : ""}${s.status ? " · status: " + escapeHtml(s.status) : ""}</div>
        ${payloadStr ? `<div class="signal-payload">${escapeHtml(payloadStr)}</div>` : ""}
      </div>`;
    }).join("");
  }).join("");

  const gisLink = (RAW.gis_deep_link_template || "").replace("{pid}", encodeURIComponent(r.pid || ""));
  const expandEl = document.createElement("div");
  expandEl.className = "lead-row expand";
  expandEl.innerHTML = `
    <div class="expand-grid">
      <div class="key">PID</div><div class="val">${escapeHtml(r.pid || "—")}</div>
      <div class="key">Block / Lot / Qual</div><div class="val">${escapeHtml(r.block || "—")} / ${escapeHtml(r.lot || "—")} / ${escapeHtml(r.qualifier || "—")}</div>
      <div class="key">Situs</div><div class="val">${escapeHtml(r.situs_address || "—")}, ${escapeHtml(r.mun_name || "")}</div>
      <div class="key">Mailing</div><div class="val">${escapeHtml(r.mailing_address || "—")}, ${escapeHtml(r.mailing_city_state || "")} ${escapeHtml(r.mailing_zip || "")}</div>
      <div class="key">Owner</div><div class="val">${escapeHtml(r.owner || "(redacted upstream — see methodology)")}</div>
      <div class="key">Year built / dwell / class</div><div class="val">${escapeHtml(String(r.year_built||"—"))} / ${escapeHtml(String(r.dwell||"—"))} / ${escapeHtml(r.prop_class || "—")} (${escapeHtml(r.bldg_class || "—")})</div>
      <div class="key">Assessed</div><div class="val">${fmtMoney(r.land_val)} land + ${fmtMoney(r.imprvt_val)} imprvt = <strong>${fmtMoney(r.assessed_value)}</strong> · last yr tax ${fmtMoney(r.last_yr_tx)}</div>
      <div class="key">Last sale</div><div class="val">${escapeHtml(r.last_sale_date || "—")} · ${fmtMoney(r.last_sale_price)} · book ${escapeHtml(r.deed_book || "—")} pg ${escapeHtml(r.deed_page || "—")} · ${r.years_owned != null ? r.years_owned + " yrs owned" : "—"}</div>
      <div class="key">Lead types / depth</div><div class="val">${safeArr(r.patterns).map(p => `<span class="chip ${p}">${PATTERN_DISPLAY[p]}</span>`).join(" ")} · depth ${r.pattern_count || 0}</div>
      <div class="key">Attributes</div><div class="val">${safeArr(r.attributes).map(a => ATTR_DISPLAY[a] || a).join(", ") || "—"}</div>
      <div class="key">GIS</div><div class="val">${gisLink ? `<a href="${gisLink}" target="_blank" rel="noopener">Open NJ ArcGIS parcel record</a>` : "—"}</div>
    </div>
    <div style="font-weight:600;color:var(--text-muted);font-size:11px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">Signals (${safeArr(r.signals).length})</div>
    ${sigBlocks || "<em style='color:var(--text-muted)'>none</em>"}
  `;
  rowEl.parentElement.insertBefore(expandEl, rowEl.nextSibling);
  rowEl.classList.add("expanded");
}

// =============== CSV export ===============================================
function exportCsv(filtered) {
  const cols = [
    "pid","block","lot","qualifier","owner","situs_address","mailing_address","mun_name",
    "year_built","assessed_value","last_sale_date","last_sale_price","years_owned",
    "lead_types","lead_type_count",
    ...ATTR_NAMES,
    "signal_count","last_signal_date",
    "phone1","phone2","phone3","email1","email2",
  ];
  const rows = [cols.join(",")];
  for (const r of filtered) {
    const vals = cols.map(c => {
      let v;
      if (c === "lead_types") v = safeArr(r.patterns).map(p => PATTERN_DISPLAY[p]).join(";");
      else if (c === "lead_type_count") v = r.pattern_count || 0;
      else if (ATTR_NAMES.includes(c)) v = safeArr(r.attributes).includes(c) ? 1 : 0;
      else if (c === "signal_count") v = safeArr(r.signals).length;
      else if (["phone1","phone2","phone3","email1","email2"].includes(c)) v = "";
      else v = r[c];
      if (v == null) v = "";
      v = String(v);
      if (v.includes(",") || v.includes('"') || v.includes("\n")) v = '"' + v.replace(/"/g, '""') + '"';
      return v;
    });
    rows.push(vals.join(","));
  }
  const blob = new Blob([rows.join("\n")], { type: "text/csv;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `ocean-intel-leads-${new Date().toISOString().slice(0,10).replace(/-/g,"")}-${filtered.length}.csv`;
  document.body.appendChild(a); a.click();
  setTimeout(() => { URL.revokeObjectURL(url); a.remove(); }, 100);
}

// =============== Wiring ===================================================
function bindFilterRail() {
  document.getElementById("filter-patterns").addEventListener("change", (e) => {
    const t = e.target;
    if (t.dataset.pattern) {
      if (t.checked) filters.patterns.add(t.dataset.pattern); else filters.patterns.delete(t.dataset.pattern);
    } else if (t.dataset.subtype) {
      if (t.checked) filters.subtypes.add(t.dataset.subtype); else filters.subtypes.delete(t.dataset.subtype);
    }
    renderAll();
  });
  document.getElementById("filter-attributes").addEventListener("change", (e) => {
    const t = e.target;
    if (t.dataset.attribute) {
      if (t.checked) filters.attributes.add(t.dataset.attribute); else filters.attributes.delete(t.dataset.attribute);
      renderAll();
    }
  });
  document.getElementById("match-mode-buttons").addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-mode]");
    if (!btn) return;
    filters.match_mode = btn.dataset.mode;
    document.querySelectorAll("#match-mode-buttons button").forEach(b => b.classList.toggle("active", b === btn));
    renderAll();
  });
  document.getElementById("clear-all").addEventListener("click", () => {
    filters.patterns.clear(); filters.subtypes.clear(); filters.attributes.clear();
    filters.search = ""; filters.minYearsOwned = 0; filters.minAssessed = 0; filters.maxAssessed = 0;
    filters.match_mode = "ANY";
    document.getElementById("q").value = "";
    document.getElementById("f-yo").value = 0; document.getElementById("f-yo-v").textContent = "0+";
    document.getElementById("f-amin").value = 0; document.getElementById("f-amin-v").textContent = "$0";
    document.getElementById("f-amax").value = 0; document.getElementById("f-amax-v").textContent = "no cap";
    document.querySelectorAll("#match-mode-buttons button").forEach(b => b.classList.toggle("active", b.dataset.mode === "ANY"));
    renderFilterRail();
    renderAll();
  });
}

function bindToolbar() {
  let timer;
  document.getElementById("q").addEventListener("input", (e) => {
    clearTimeout(timer);
    timer = setTimeout(() => { filters.search = e.target.value.trim(); renderAll(); }, 120);
  });
  document.getElementById("sort").addEventListener("change", (e) => { sort_key = e.target.value; renderAll(); });
  document.getElementById("f-yo").addEventListener("input", (e) => {
    filters.minYearsOwned = +e.target.value;
    document.getElementById("f-yo-v").textContent = filters.minYearsOwned > 0 ? filters.minYearsOwned + "+" : "0+";
    renderAll();
  });
  document.getElementById("f-amin").addEventListener("input", (e) => {
    filters.minAssessed = +e.target.value;
    document.getElementById("f-amin-v").textContent = "$" + filters.minAssessed.toLocaleString();
    renderAll();
  });
  document.getElementById("f-amax").addEventListener("input", (e) => {
    filters.maxAssessed = +e.target.value;
    document.getElementById("f-amax-v").textContent = filters.maxAssessed > 0 ? "$" + filters.maxAssessed.toLocaleString() : "no cap";
    renderAll();
  });

}

function bindCards() {
  document.getElementById("cards-wrap").addEventListener("click", (e) => {
    const r = e.target.closest(".lead-row");
    if (r && !r.classList.contains("expand")) expandRow(r);
  });
  document.getElementById("stats-leadtypes").addEventListener("click", (e) => {
    const tile = e.target.closest("[data-stat-pattern]"); if (!tile) return;
    if (tile.classList.contains("dimmed")) return;
    const p = tile.dataset.statPattern;
    if (filters.patterns.has(p)) filters.patterns.delete(p); else filters.patterns.add(p);
    const cb = document.querySelector(`#filter-patterns input[data-pattern="${p}"]`);
    if (cb) cb.checked = filters.patterns.has(p);
    renderAll();
  });
}

function applyPrecanned(id) {
  const v = PRECANNED_VIEWS.find(x => x.id === id);
  if (!v) return;
  filters.patterns = new Set(v.patterns);
  filters.subtypes = new Set();
  filters.attributes = new Set(v.attributes);
  filters.match_mode = v.mode;
  if (v.sort) {
    sort_key = v.sort;
    const sortEl = document.getElementById("sort"); if (sortEl) sortEl.value = sort_key;
  }
  document.querySelectorAll("#match-mode-buttons button").forEach(b => b.classList.toggle("active", b.dataset.mode === filters.match_mode));
  renderFilterRail(); renderAll();
}

function bindPrecanned() {
  document.getElementById("precanned-row").addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-precanned]"); if (btn) applyPrecanned(btn.dataset.precanned);
  });
}

// =============== Load =====================================================
async function load() {
  let data;
  try {
    const r = await fetch("./data/leads.json", { cache: "no-cache" });
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    data = await r.json();
  } catch (e) {
    showError(`Failed to load data/leads.json: ${e}\nRun: py -3.12 pipeline/refresh.py --dry-run`);
    return;
  }
  RAW = data;
  RECORDS = safeArr(data.records);

  renderHeader();
  renderFilterRail();
  bindFilterRail();
  bindToolbar();
  bindCards();
  bindPrecanned();
  renderAll();

  // Ready marker — used by pipeline/verify.py to confirm dashboard rendered
  // successfully in the live browser (Phase 5 verification gate).
  document.body.dataset.ready = "1";
}

load().catch(e => showError(`load() rejected: ${e && e.stack ? e.stack : e}`));
</script>
